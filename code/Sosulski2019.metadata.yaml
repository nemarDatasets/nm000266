abstract: The decoding of brain signals recorded via, e.g., an electroencephalogram, using machine learning is key to brain-computer
  interfaces (BCIs). Stimulation parameters or other experimental settings of the BCI protocol typically are chosen according
  to the literature. The decoding performance directly depends on the choice of parameters, as they influence the elicited
  brain signals and optimal parameters are subject-dependent. Thus a fast and automated selection procedure for experimental
  parameters could greatly improve the usability of BCIs. We evaluate a standalone random search and a combined Bayesian optimization
  with random search into a closed-loop auditory event-related potential protocol. We aimed at finding the individually best
  stimulation speed—also known as stimulus onset asynchrony (SOA)—that maximizes the classification performance of a regularized
  linear discriminant analysis.
