  mode: online
  n_classes: 2
  paradigm: p300
  primary_modality: auditory
  stimulus_modalities:
  - auditory
  stimulus_presentation:
    distance_cm: '65'
    non_target_tone_hz: '500'
    target_tone_hz: '1000'
    tone_duration_ms: '40'
  stimulus_type: oddball
  study_design: Subjects focused attention on target tones (1000 Hz) and ignored non-target tones (500 Hz) presented via speaker
    at 65 cm distance. One trial consisted of 15 target and 75 non-target stimuli in pseudo-random order with at least two
    non-target tones between target tones. The experiment was split into optimization and validation parts.
  synchronicity: synchronous
file_format: brainvision
methodology: 'The experiment was divided into two parts: (1) Optimization part: four strategies (AUC-ucb, AUC-rand, P300-ucb,
  P300-rand) each allocated 20 minutes to find optimal SOA. Strategies alternated to minimize non-stationarity effects. (2)
  Validation part: evaluated SOAs from each optimization strategy plus fixed 60ms SOA using 20 trials each (in blocks of 5
  trials). Features were mean amplitudes in 5 time intervals ([100, 170], [171, 230], [231, 300], [301, 410], [411, 500] ms)
  across 31 channels (155 dimensions total). Classification used rLDA with automatic shrinkage regularization and 13-fold
  cross-validation on single trials.'
